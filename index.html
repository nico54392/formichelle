<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixel Desktop</title>

  <style>
    :root{
      --bg: #2b2118;        /* deep brown */
      --window: #c9b79c;    /* beige */
      --accent: #6b4f3a;    /* warm brown */
      --text: #1f1610;      /* dark espresso */
      --muted: #3a2b22;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: "Courier New", monospace;
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Desktop */
    #desktop {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(6, 120px);
      grid-auto-rows: 120px;
      gap: 20px;
      padding: 30px;
      align-content: start;
    }

    .icon {
      width: 100px;
      height: 100px;
      background: var(--window);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      text-align: center;
      font-size: 12px;
      transition: transform 0.1s;
      color: var(--text);
    }

    .icon:hover {
      transform: scale(1.05);
      background: #d6c7af;
    }

    /* Window system */
    #window {
      position: absolute;
      top: 80px;
      right: 80px;
      width: 420px;
      height: 320px;
      background: var(--window);
      border: 2px solid var(--accent);
      display: none;
      flex-direction: column;
      box-shadow: 6px 6px 0px #1a130e;
    }

    #titlebar {
      height: 32px;
      background: var(--accent);
      color: var(--window);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      cursor: move;
      font-size: 12px;
    }

    #close {
      cursor: pointer;
      color: var(--window);
      font-weight: bold;
    }

    #content {
      flex: 1;
      padding: 12px;
      font-size: 13px;
      color: var(--text);
      overflow: auto;
    }

    button {
      background: var(--accent);
      color: var(--window);
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: #f2e6d5;
      border: 1px solid var(--accent);
      color: var(--text);
      font-family: inherit;
    }
  </style>
</head>

<body>

  <div id="desktop">
    <div class="icon" onclick="openApp('Game 1')">Game 1</div>
    <div class="icon" onclick="openApp('Game 2')">Game 2</div>
    <div class="icon" onclick="openApp('Notes')">Notes</div>
    <div class="icon" onclick="openApp('Terminal')">Terminal</div>
  </div>

  <div id="window">
    <div id="titlebar">
      <span id="title">App</span>
      <span id="close" onclick="closeWindow()">✕</span>
    </div>
    <div id="content"></div>
  </div>

  <script>
    const win = document.getElementById("window");
    const title = document.getElementById("title");
    const content = document.getElementById("content");

    function openApp(name){
      win.style.display = "flex";
      title.textContent = name;

      if(name === "Game 1"){
        content.innerHTML = `
          <p>Question: 2 + 2 = ?</p>
          <button onclick="alert('Correcto ✔')">4</button>
          <button onclick="alert('Incorrecto ✖')">5</button>
        `;
      }
      else if(name === "Game 2"){
        content.innerHTML = `
          <p>Placeholder game slot.</p>
          <button onclick="alert('Try again')">Try</button>
        `;
      }
      else if(name === "Notes"){
        content.innerHTML = `<textarea placeholder="write something..."></textarea>`;
      }
      else if(name === "Terminal"){
        content.innerHTML = `<p>$ beige-shell v0.1</p>`;
      }
    }

    function closeWindow(){
      win.style.display = "none";
    }

    // drag
    let isDragging = false;
    let offsetX, offsetY;

    document.getElementById("titlebar").addEventListener("mousedown", (e)=>{
      isDragging = true;
      offsetX = e.clientX - win.offsetLeft;
      offsetY = e.clientY - win.offsetTop;
    });

    document.addEventListener("mousemove", (e)=>{
      if(isDragging){
        win.style.left = (e.clientX - offsetX) + "px";
        win.style.top = (e.clientY - offsetY) + "px";
      }
    });

    document.addEventListener("mouseup", ()=>{
      isDragging = false;
    });
  </script>

</body>
</html>
